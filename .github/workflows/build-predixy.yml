name: Build predixy

on:
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      make_latest:
        required: false
        type: boolean
        default: false
      prerelease:
        required: false
        type: boolean
        default: false
    outputs:
      release_version:
        description: "The version of predixy being built"
        value: ${{ jobs.prepare.outputs.release_version }}

  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to release (e.g. 1.0.5)'
        required: true
        type: string
      make_latest:
        description: 'Mark as latest release'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.setup.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        id: setup
        run: |
          VERSION="${{ inputs.release_version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          git archive -o predixy-$VERSION.tar.gz HEAD

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: predixy-source
          path: predixy-${{ inputs.release_version }}.tar.gz

  build-linux:
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            container: quay.io/pypa/manylinux2014_x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux2014_aarch64
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup devtoolset
        run: |
          for dts in /opt/rh/devtoolset-*/enable; do
            if [ -f "$dts" ]; then
              echo "DEVTOOLSET=$dts" >> $GITHUB_ENV
              echo "Found devtoolset: $dts"
              break
            fi
          done

      - name: Build
        run: |
          [ -n "$DEVTOOLSET" ] && source "$DEVTOOLSET"
          cd src
          make EV=epoll -j$(nproc)

      - name: Verify
        run: |
          [ -n "$DEVTOOLSET" ] && source "$DEVTOOLSET"
          src/predixy --version

      - name: Package
        run: |
          VERSION="${{ needs.prepare.outputs.release_version }}"
          DIST="predixy-$VERSION-linux-glibc2.17-${{ matrix.arch }}"
          mkdir -p "$DIST/conf"
          cp src/predixy "$DIST/"
          cp conf/*.conf "$DIST/conf/"
          tar czf "$DIST.tar.gz" "$DIST"
          sha256sum "$DIST.tar.gz" > "$DIST.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: predixy-linux-${{ matrix.arch }}
          path: |
            predixy-*-linux-glibc2.17-${{ matrix.arch }}.tar.gz
            predixy-*-linux-glibc2.17-${{ matrix.arch }}.tar.gz.sha256

  build-windows:
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          update: true
          install: gcc make zip

      - name: Build with MSYS2
        shell: msys2 {0}
        run: |
          cd src
          make EV=poll -j$(nproc)

      - name: Verify
        shell: msys2 {0}
        run: src/predixy.exe --version

      - name: Package
        shell: msys2 {0}
        run: |
          VERSION="${{ needs.prepare.outputs.release_version }}"
          DIST="predixy-$VERSION-windows-${{ matrix.arch }}-msys2"
          mkdir -p "$DIST/conf"
          cp src/predixy.exe "$DIST/"
          cp conf/*.conf "$DIST/conf/"
          cp /usr/bin/msys-2.0.dll "$DIST/"
          for dll in $(ldd src/predixy.exe 2>/dev/null | grep -oP '/usr/bin/msys-[^\s]+' | sort -u); do
            cp "$dll" "$DIST/" 2>/dev/null || true
          done
          zip -q -r "$DIST.zip" "$DIST"
          sha256sum "$DIST.zip" > "$DIST.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: predixy-windows-${{ matrix.arch }}
          path: |
            predixy-*-windows-${{ matrix.arch }}-msys2.zip
            predixy-*-windows-${{ matrix.arch }}-msys2.zip.sha256

  release:
    needs: [prepare, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Set version
        run: echo "VERSION=${{ needs.prepare.outputs.release_version }}" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: predixy ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          make_latest: "${{ inputs.make_latest }}"
          prerelease: ${{ inputs.prerelease }}
          files: |
            predixy-linux-x86_64/predixy-${{ env.VERSION }}-linux-glibc2.17-x86_64.tar.gz
            predixy-linux-x86_64/predixy-${{ env.VERSION }}-linux-glibc2.17-x86_64.tar.gz.sha256
            predixy-linux-aarch64/predixy-${{ env.VERSION }}-linux-glibc2.17-aarch64.tar.gz
            predixy-linux-aarch64/predixy-${{ env.VERSION }}-linux-glibc2.17-aarch64.tar.gz.sha256
            predixy-windows-x86_64/predixy-${{ env.VERSION }}-windows-x86_64-msys2.zip
            predixy-windows-x86_64/predixy-${{ env.VERSION }}-windows-x86_64-msys2.zip.sha256
